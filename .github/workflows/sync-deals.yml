name: Sync Deals from Google Sheet

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 6 AM UTC (2 AM EST)
  workflow_dispatch:        # also runnable manually from GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync deals from Google Sheet
        run: node scripts/sync-deals.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.ts data/geocache.json
          git diff --staged --quiet || git commit -m "chore: sync deals from Google Sheet [skip ci]"
          git push
